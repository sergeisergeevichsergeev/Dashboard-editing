<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Editing</title>
<style>
  @font-face {
    font-family: 'YS Text';
    src: local('YS Text'), local('YandexSansText'), local('Yandex Sans Text');
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html, body {
    height: 100%;
    width: 100%;
  }

  html {
    scroll-padding-bottom: 100px;
  }

  body {
    font-family: 'YS Text', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #F5F6F7;
    position: relative;
    min-height: 100vh;
    padding-bottom: 120px;
  }

  .action-panel {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: row;
    gap: 0;
    padding: 6px;
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(60px);
    -webkit-backdrop-filter: blur(60px);
    border-radius: 16px;
  }

  .action-panel-item {
    position: relative;
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 8px;
    padding: 12px 16px;
    background: transparent;
    border-radius: 10px;
    cursor: grab;
    border: none;
    color: #FFFFFF;
    font-family: 'YS Text', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 13px;
    line-height: 18px;
    font-weight: 500;
    white-space: nowrap;
    transition: background 0.15s ease, transform 0.15s ease, box-shadow 0.15s ease;
  }

  .action-panel-item::before {
    content: '';
    position: absolute;
    left: 0;
    right: 0;
    top: 100%;
    height: 4px;
  }

  .action-panel-item:hover {
    background: rgba(255, 255, 255, 0.07);
    transform: translateY(-2px);
    box-shadow: 0 3px 10px rgba(0, 0, 0, 0.15);
  }

  .action-panel-item:active {
    cursor: grabbing;
  }

  .action-panel-item img {
    width: 16px;
    height: 16px;
    display: block;
    filter: brightness(0) invert(1);
  }

  .action-panel-item:last-child img {
    filter: none;
  }

  .statusbar {
    position: fixed;
    top: 0;
    left: 0;
    height: 100vh;
    width: 56px;
    object-fit: cover;
    object-position: top;
    display: block;
    z-index: 10;
  }

  .dashboard {
    display: grid;
    grid-template-columns: 400px 1216px;
    grid-template-rows: 44px auto;
    gap: 8px;
    padding: 8px;
    padding-left: 80px;
    width: max-content;
  }

  .dashboard-title {
    height: 44px;
    display: flex;
    align-items: center;
    font-family: 'YS Text', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 24px;
    line-height: 28px;
    font-weight: 500;
    color: #000000;
  }

  .dashboard-header-right {
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: flex-end;
    gap: 8px;
    height: 44px;
  }

  .dashboard-header-right .img-4 {
    width: 264px;
    height: 44px;
    display: block;
  }

  .dashboard-header-right .img-5 {
    width: 355px;
    height: 44px;
    display: block;
  }

  .dashboard-left {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .dashboard-left .img-1 {
    width: 400px;
    height: 330px;
    display: block;
  }

  .dashboard-left .img-2 {
    width: 400px;
    height: 200px;
    display: block;
  }

  .dashboard-left .img-3 {
    width: 308px;
    height: 157px;
    display: block;
  }

  .dashboard-right .img-6 {
    width: 1216px;
    height: 694px;
    display: block;
  }

  .img-wrap {
    position: relative;
    display: block;
    line-height: 0;
  }

  .img-wrap::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255, 255, 255, 0.5);
    pointer-events: none;
  }

  .widget-actions {
    position: absolute;
    top: 8px;
    right: 8px;
    display: flex;
    flex-direction: row;
    background: #FFFFFF;
    border-radius: 6px;
    box-shadow: 0 1px 5px rgba(0, 0, 0, 0.15);
    z-index: 2;
    line-height: 0;
  }

  .widget-actions button {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    padding: 0;
    border: none;
    background: transparent;
    cursor: pointer;
  }

  .widget-actions button img {
    width: 16px;
    height: 16px;
    display: block;
  }

  .drop-placeholder {
    width: 536px;
    height: 304px;
    background: rgba(2, 123, 254, 0.1);
    pointer-events: none;
    flex-shrink: 0;
    align-self: flex-start;
  }

  .drag-ghost {
    position: fixed !important;
    pointer-events: none;
    z-index: 1000;
    background: rgba(0, 0, 0, 0.7) !important;
    backdrop-filter: blur(60px);
    -webkit-backdrop-filter: blur(60px);
    border-radius: 10px !important;
    opacity: 0.9;
    transform: none !important;
  }

  .action-panel-item.dragging-source {
    opacity: 0.35;
  }

  body.is-dragging .action-panel-item:hover {
    background: transparent;
    transform: none;
    box-shadow: none;
  }

  .added-widget {
    width: 536px;
    height: 304px;
    margin: 8px 8px 8px 80px;
    background: #FFFFFF;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    line-height: 24px;
    font-weight: 500;
    color: #000000;
    cursor: pointer;
    transition: transform 0.15s ease;
    scroll-margin-bottom: 100px;
  }

  .added-widget.selected {
    box-shadow: 0 0 0 2px #027BFE;
  }
</style>
</head>
<body>

  <div class="dashboard">

    <div class="dashboard-header-right">
      <span class="img-wrap"><img class="img-4" src="4.png?v=2" alt=""><span class="widget-actions"><button type="button"><img src="настройки.svg" alt=""></button><button type="button"><img src="связи.svg" alt=""></button><button type="button"><img src="больше.svg" alt=""></button></span></span>

      <span class="img-wrap"><img class="img-2" src="2.png?v=2" alt=""><span class="widget-actions"><button type="button"><img src="настройки.svg" alt=""></button><button type="button"><img src="связи.svg" alt=""></button><button type="button"><img src="больше.svg" alt=""></button></span></span>
      <span class="img-wrap"><img class="img-3" src="3.png?v=2" alt=""><span class="widget-actions"><button type="button"><img src="настройки.svg" alt=""></button><button type="button"><img src="связи.svg" alt=""></button><button type="button"><img src="больше.svg" alt=""></button></span></span>
    </div>
    <div class="dashboard-right">
      <span class="img-wrap"><img class="img-6" src="6.png?v=2" alt=""><span class="widget-actions"><button type="button"><img src="настройки.svg" alt=""></button><button type="button"><img src="связи.svg" alt=""></button><button type="button"><img src="больше.svg" alt=""></button></span></span>
    </div>
  </div>

  <div class="action-panel">
    <button class="action-panel-item">
      <img src="чарт.svg" alt="">
      <span>Чарт</span>

      <span>Селектор (JS)</span>

      <span>Нейроаналитик</span>
    </button>

<script>
(() => {
  const NEW_W = 536;
  const NUDGE = 45;
  const DRAG_THRESHOLD = 4;

  const items = document.querySelectorAll('.action-panel-item');
  let drag = null;

  items.forEach(item => {
    item.addEventListener('mousedown', (e) => {
      if (e.button !== 0) return;
      e.preventDefault();
      const rect = item.getBoundingClientRect();
      drag = {
        item,
        startX: e.clientX,
        startY: e.clientY,
        offsetX: e.clientX - rect.left,
        offsetY: e.clientY - rect.top,
        srcRect: rect,
        ghost: null,
        placeholder: null,
        bottomRow: null,
        movedElements: null,
        movedFromCol: null,
        dashEl: null,
        currentTarget: null,
        active: false,
      };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
  });

  function activate() {
    const ghost = drag.item.cloneNode(true);
    ghost.classList.add('drag-ghost');
    ghost.style.left = drag.srcRect.left + 'px';
    ghost.style.top = drag.srcRect.top + 'px';
    ghost.style.width = drag.srcRect.width + 'px';
    ghost.style.height = drag.srcRect.height + 'px';
    document.body.appendChild(ghost);

    const placeholder = document.createElement('div');
    placeholder.className = 'drop-placeholder';

    drag.ghost = ghost;
    drag.placeholder = placeholder;
    drag.item.classList.add('dragging-source');
    drag.active = true;
    document.body.classList.add('is-dragging');
    document.body.style.userSelect = 'none';
    document.body.style.cursor = 'grabbing';
  }

  function findTarget(x, y) {
    if (drag.bottomRow) {
      const r = drag.bottomRow.getBoundingClientRect();
      if (x >= r.left && x <= r.right && y >= r.top && y <= r.bottom) {
        return drag.currentTarget;
      }
    }
    const widgets = document.querySelectorAll('.dashboard-left > .img-wrap, .dashboard-right > .img-wrap');
    for (const w of widgets) {
      const r = w.getBoundingClientRect();
      if (x >= r.left && x <= r.right && y >= r.top && y <= r.bottom) return w;
    }
    return null;
  }

  function teardownLayout() {
    drag.placeholder.style.transform = '';
    if (drag.bottomRow) {
      if (drag.movedElements && drag.movedFromCol) {
        for (const el of drag.movedElements) {
          drag.movedFromCol.appendChild(el);
        }
      }
      drag.bottomRow.remove();
      if (drag.dashEl) drag.dashEl.style.gridTemplateRows = '';
      drag.bottomRow = null;
      drag.movedElements = null;
      drag.movedFromCol = null;
      drag.dashEl = null;
    }
    if (drag.placeholder.parentElement) drag.placeholder.remove();
  }

  function setupLayout(target) {
    const col = target.parentElement;
    const dash = col.parentElement;
    const colW = col.getBoundingClientRect().width;

    if (NEW_W <= colW) {
      col.insertBefore(drag.placeholder, target);
    } else {
      const elementsToMove = [];
      let cursor = target;
      while (cursor) {
        elementsToMove.push(cursor);
        cursor = cursor.nextElementSibling;
      }

      const bottom = document.createElement('div');
      bottom.className = 'dashboard-bottom-temp';
      bottom.style.cssText = 'grid-column: 1 / -1; display: flex; flex-direction: row; flex-wrap: wrap; gap: 8px; align-items: flex-start;';
      dash.appendChild(bottom);
      dash.style.gridTemplateRows = '44px auto auto';

      bottom.appendChild(drag.placeholder);
      for (const el of elementsToMove) {
        bottom.appendChild(el);
      }

      drag.bottomRow = bottom;
      drag.movedElements = elementsToMove;
      drag.movedFromCol = col;
      drag.dashEl = dash;
    }

    const phRect = drag.placeholder.getBoundingClientRect();
    drag.naturalLeft = phRect.left;
    if (drag.bottomRow) {
      drag.minNudge = 0;
      drag.maxNudge = 0;
    } else {
      const colRect = col.getBoundingClientRect();
      drag.minNudge = colRect.left - phRect.left;
      drag.maxNudge = colRect.right - phRect.right;
    }
  }

  function applyNudge(x) {
    const cursorRelX = x - drag.naturalLeft;
    const idealOffset = cursorRelX - NEW_W / 2;
    const raw = idealOffset < 0 ? -NUDGE : NUDGE;
    const nudge = Math.max(drag.minNudge, Math.min(drag.maxNudge, raw));
    drag.placeholder.style.transform = `translateX(${nudge}px)`;
  }

  function onMove(e) {
    if (!drag) return;

    if (!drag.active) {
      const dx = e.clientX - drag.startX;
      const dy = e.clientY - drag.startY;
      if (Math.hypot(dx, dy) < DRAG_THRESHOLD) return;
      activate();
    }

    drag.ghost.style.left = (e.clientX - drag.offsetX) + 'px';
    drag.ghost.style.top = (e.clientY - drag.offsetY) + 'px';

    drag.lastX = e.clientX;
    drag.lastY = e.clientY;

    const panel = drag.item.closest('.action-panel');
    const pr = panel.getBoundingClientRect();
    const overPanel = e.clientX >= pr.left && e.clientX <= pr.right &&
                      e.clientY >= pr.top && e.clientY <= pr.bottom;
    if (overPanel) {
      drag.ghost.style.display = 'none';
      if (drag.currentTarget) {
        teardownLayout();
        drag.currentTarget = null;
      }
      if (drag.hoverTimer) {
        clearTimeout(drag.hoverTimer);
        drag.hoverTimer = null;
      }
      return;
    }
    drag.ghost.style.display = '';

    if (drag.hasShown) {
      const target = findTarget(e.clientX, e.clientY);
      if (target && target !== drag.currentTarget) {
        teardownLayout();
        setupLayout(target);
        drag.currentTarget = target;
      }
      if (drag.currentTarget) {
        applyNudge(e.clientX);
      }
      return;
    }

    if (drag.hoverTimer) {
      clearTimeout(drag.hoverTimer);
    }
    drag.hoverTimer = setTimeout(() => {
      drag.hoverTimer = null;
      const target = findTarget(drag.lastX, drag.lastY);
      if (!target) return;
      setupLayout(target);
      drag.currentTarget = target;
      drag.hasShown = true;
      applyNudge(drag.lastX);
    }, 150);
  }

  function onUp() {
    if (!drag) return;
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);

    if (drag.hoverTimer) {
      clearTimeout(drag.hoverTimer);
      drag.hoverTimer = null;
    }

    if (drag.active) {
      drag.ghost.remove();
      teardownLayout();
      drag.item.classList.remove('dragging-source');
      document.body.style.userSelect = '';
      document.body.style.cursor = '';
      setTimeout(() => {
        document.body.classList.remove('is-dragging');
      }, 300);
    } else {
      addWidgetAtBottom();
    }
    drag = null;
  }

  function addWidgetAtBottom() {
    const widget = document.createElement('div');
    widget.className = 'added-widget';
    widget.textContent = 'Чарт';
    const panel = document.querySelector('.action-panel');
    document.body.insertBefore(widget, panel);
    scrollWidgetIntoView(widget);
    selectWidget(widget);
  }

  function scrollWidgetIntoView(widget) {
    const panel = document.querySelector('.action-panel');
    const panelRect = panel.getBoundingClientRect();
    const widgetRect = widget.getBoundingClientRect();
    const desiredBottom = panelRect.top - 16;
    if (widgetRect.bottom > desiredBottom) {
      const delta = widgetRect.bottom - desiredBottom;
      window.scrollTo({ top: window.scrollY + delta, behavior: 'smooth' });
    }
  }

  function selectWidget(widget) {
    document.querySelectorAll('.added-widget.selected').forEach(w => w.classList.remove('selected'));
    widget.classList.add('selected');
  }

  function deselectAll() {
    document.querySelectorAll('.added-widget.selected').forEach(w => w.classList.remove('selected'));
  }

  function getMovableSiblings() {
    return [...document.body.querySelectorAll(':scope > .dashboard, :scope > .added-widget')];
  }

  document.addEventListener('click', (e) => {
    const widget = e.target.closest('.added-widget');
    if (widget) selectWidget(widget);
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      deselectAll();
      return;
    }
    const selected = document.querySelector('.added-widget.selected');
    if (!selected) return;

    if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
      e.preventDefault();
      const SIDEBAR_W = 56;
      const EDGE_PAD = 24;
      const leftBound = SIDEBAR_W + EDGE_PAD;
      const rightBound = document.body.scrollWidth - EDGE_PAD;
      const current = parseFloat(selected.dataset.offsetX || '0');
      const naturalLeft = selected.offsetLeft;
      const naturalRight = naturalLeft + selected.offsetWidth;
      const minOffset = leftBound - naturalLeft;
      const maxOffset = rightBound - naturalRight;
      let next;
      if (e.shiftKey) {
        next = e.key === 'ArrowLeft' ? minOffset : maxOffset;
      } else {
        const dx = e.key === 'ArrowLeft' ? -45 : 45;
        next = Math.max(minOffset, Math.min(maxOffset, current + dx));
      }
      selected.dataset.offsetX = next;
      selected.style.transform = `translateX(${next}px)`;
      return;
    }

    if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
      e.preventDefault();
      const siblings = getMovableSiblings();
      const idx = siblings.indexOf(selected);
      if (idx === -1) return;
      if (e.key === 'ArrowUp' && idx > 0) {
        selected.parentNode.insertBefore(selected, siblings[idx - 1]);
      } else if (e.key === 'ArrowDown' && idx < siblings.length - 1) {
        const next = siblings[idx + 1];
        if (next.nextSibling) {
          selected.parentNode.insertBefore(selected, next.nextSibling);
        } else {
          selected.parentNode.appendChild(selected);
        }
      }
      selected.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
  });
})();
</script>
